<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wigells Car Rental | Gold Standard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <header class="header">
        <div class="container header-content">
            <div class="logo-container" role="button" tabindex="0" aria-label="Gå till startsida" onclick="window.location.hash='#bilar'" onkeydown="if(event.key==='Enter') window.location.hash='#bilar'">
                <img src="koncernensBackend/images/w-logo-gold.png" alt="Wigells Gold Standard Logotyp">
                <div class="logo-text">Wigells</div>
            </div>
            <nav aria-label="Huvudnavigation">
                <ul class="nav-list">
                    <li>
                        <a href="#bilar" class="nav-link active" id="nav-fleet" aria-label="Visa bilar">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.28l1.08 3.11H5.77L6.85 7zM7.5 16c-.83 0-1.5-.67-1.5-1.5S6.67 13 7.5 13s1.5.67 1.5 1.5S8.33 16 7.5 16zm9 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                            Bilar
                        </a>
                    </li>
                    <li>
                        <a href="#kontakt" class="nav-link" id="nav-contact" aria-label="Kontakt">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                            Kontakt
                        </a>
                    </li>
                    <li id="nav-login-item">
                        <a href="#login" class="nav-link" id="nav-login-link" aria-label="Logga in">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                            Logga in
                        </a>
                    </li>
                    <li id="nav-admin-item" style="display:none">
                        <a href="#admin" class="nav-link" id="nav-admin-link" aria-label="Adminpanel">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.56-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.73 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .43-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.49-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                            Admin Kontrollpanel
                        </a>
                    </li>
                    <li id="nav-user-info" class="user-profile-nav" style="display:none">
                        <button class="nav-profile-btn" onclick="app.showProfile()" aria-label="Visa min profil">
                            <div class="user-avatar">
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm0 14c-2.03 0-4.43-.82-6.14-2.88C7.55 15.8 9.68 15 12 15s4.45.8 6.14 2.12C16.43 19.18 14.03 20 12 20z"/></svg>
                            </div>
                            <span id="user-display-name" class="user-name"></span>
                        </button>
                        <button onclick="app.logout()" class="logout-btn" aria-label="Logga ut" title="Logga ut">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                        </button>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="app-content" class="container" role="main">
        <!-- SPA Mount Point -->
    </main>

    <!-- Modal System -->
    <div id="modal-backdrop" class="modal-backdrop" style="display:none;" onclick="if(event.target === this) app.closeModal()">
        <div id="modal-container" class="modal-container" role="dialog" aria-modal="true">
            <!-- Dynamiskt innehåll -->
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-logos">
                <img src="KoncernLogga.png" alt="Wigells Logotyp" class="inverted-logo logo-small">
            </div>
            <div class="footer-text">
                <p>&copy; 2026 WIGELLS GOLD STANDARD. ALLA RÄTTIGHETER FÖRBEHÅLLNA.</p>
                <div class="footer-accent"></div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
