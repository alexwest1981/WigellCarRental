version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: wigell_mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rental
    volumes:
      - ./data.sql:/docker-entrypoint-initdb.d/data.sql
    command: --default-authentication-plugin=mysql_native_password
